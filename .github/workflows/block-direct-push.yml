name: Bloquear push direto

on:
  push:
    branches:
      - main
      - develop

jobs:
  check-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar se foi push direto
        run: |
          if [ "${{ github.event.forced }}" = "true" ] || [ -z "${{ github.event.pull_request }}" ]; then
            echo "❌ Push direto detectado na branch ${{ github.ref_name }}!"
            echo "Todas as alterações devem passar por Pull Request."
            exit 1
          fi